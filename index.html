<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>☀️ Mood Tracker</title>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Mood Tracker"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;background:#f2f2f7;color:#1c1c1e;height:100dvh;overflow:hidden;}
    input,button{font-family:inherit;}
  </style>
</head>
<body>
<div id="app" style="height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

const HOUR_H=36;
const TOTAL_H=24;
const TL_H=HOUR_H*TOTAL_H;
const HANDLE_H=24;
const LONG_PRESS_MS=800;

const DEF_MOODS=[{name:"Happy",color:"#F6A623"},{name:"Calm",color:"#27AE60"},{name:"Anxious",color:"#E74C3C"},{name:"Focused",color:"#2980B9"},{name:"Tired",color:"#8E44AD"}];
const DEF_ACTS=[{name:"Exercise",color:"#E67E22"},{name:"Meals",color:"#C0392B"},{name:"Work",color:"#1A5276"},{name:"Social",color:"#6C3483"},{name:"Sleep",color:"#1A8FA0"}];
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function toY(h,m=0){return(h+m/60)*HOUR_H;}
function toTime(y){const t=Math.max(0,Math.min(TL_H-1,y));const h=Math.floor(t/HOUR_H);const m=Math.round(((t%HOUR_H)/HOUR_H)*60);return{h:Math.min(h,23),m};}
function fmt(h,m){return`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;}
function today(){return new Date().toISOString().slice(0,10);}
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}
function durMins(b){return Math.max(0,(b.eh*60+b.em)-(b.sh*60+b.sm));}
function load(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}

function App(){
  const [tab,setTab]=useState("mood");
  const [sv,setSv]=useState("week");
  const [date,setDate]=useState(today());
  const [mDefs,setMDefs]=useState(()=>load("mt_md",DEF_MOODS.map(m=>({...m,id:uid()}))));
  const [aDefs,setADefs]=useState(()=>load("mt_ad",DEF_ACTS.map(a=>({...a,id:uid()}))));
  const [mBlocks,setMBlocks]=useState(()=>load("mt_mb",{}));
  const [aBlocks,setABlocks]=useState(()=>load("mt_ab",{}));

  useEffect(()=>save("mt_md",mDefs),[mDefs]);
  useEffect(()=>save("mt_ad",aDefs),[aDefs]);
  useEffect(()=>save("mt_mb",mBlocks),[mBlocks]);
  useEffect(()=>save("mt_ab",aBlocks),[aBlocks]);

  // Drag from chip
  const [drag,setDrag]=useState(null);
  const [gPos,setGPos]=useState(null);
  const [gH,setGH]=useState(HOUR_H*2);
  const [preview,setPreview]=useState(null);
  const dgH=useRef(HOUR_H*2);

  // Context menu
  const [ctx,setCtx]=useState(null); // {b, type, x, y}

  // Modals
  const [editBlk,setEditBlk]=useState(null);
  const [newMoodModal,setNewMoodModal]=useState(false);
  const [newNm,setNewNm]=useState(""); const [newNc,setNewNc]=useState("#a0c4ff");
  const [newActModal,setNewActModal]=useState(false);
  const [newAn,setNewAn]=useState(""); const [newAc,setNewAc]=useState("#fd9644");
  const [editDef,setEditDef]=useState(null);
  const [edn,setEdn]=useState(""); const [edc,setEdc]=useState("");

  const mTl=useRef(null);
  const aTl=useRef(null);

  // scroll to 6am on tab change
  useEffect(()=>{
    const ref=tab==="mood"?mTl:aTl;
    if(ref.current) setTimeout(()=>{if(ref.current)ref.current.scrollTop=toY(6);},60);
  },[tab]);

  const isMood=tab==="mood";
  const tlRef=isMood?mTl:aTl;
  const dayMB=mBlocks[date]||[];
  const dayAB=aBlocks[date]||[];
  const curBlocks=isMood?dayMB:dayAB;
  const curDefs=isMood?mDefs:aDefs;

  function setMB(d,a){setMBlocks(p=>({...p,[d]:a}));}
  function setAB(d,a){setABlocks(p=>({...p,[d]:a}));}

  function addBlock(type,defId,sh,sm,eh,em){
    const b={id:uid(),defId,sh,sm,eh,em};
    if(type==="mood")setMB(date,[...dayMB,b]);
    else setAB(date,[...dayAB,b]);
  }
  function updBlock(type,id,patch){
    const setter=type==="mood"?setMBlocks:setABlocks;
    setter(p=>({...p,[date]:(p[date]||[]).map(b=>b.id===id?{...b,...patch}:b)}));
  }
  function delBlock(type,id){
    const setter=type==="mood"?setMBlocks:setABlocks;
    setter(p=>({...p,[date]:(p[date]||[]).filter(b=>b.id!==id)}));
    setCtx(null);setEditBlk(null);
  }
  function addDef(type,name,color){
    const d={id:uid(),name,color};
    if(type==="mood")setMDefs(x=>[...x,d]);else setADefs(x=>[...x,d]);
  }
  function updDef(type,id,patch){
    if(type==="mood")setMDefs(x=>x.map(d=>d.id===id?{...d,...patch}:d));
    else setADefs(x=>x.map(d=>d.id===id?{...d,...patch}:d));
  }
  function delDef(type,id){
    if(type==="mood")setMDefs(x=>x.filter(d=>d.id!==id));
    else setADefs(x=>x.filter(d=>d.id!==id));
    setEditDef(null);
  }

  // ── DRAG FROM CHIP ──────────────────────────────────────────────
  function startDrag(e,item){
    e.preventDefault();
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    dgH.current=HOUR_H*2;setGH(HOUR_H*2);
    setDrag(item);setGPos({x:cx,y:cy});
  }
  useEffect(()=>{
    if(!drag)return;
    const ref=drag.type==="mood"?mTl:aTl;
    function mv(e){
      e.preventDefault();
      const cy=e.touches?e.touches[0].clientY:e.clientY;
      const cx=e.touches?e.touches[0].clientX:e.clientX;
      setGPos({x:cx,y:cy});
      if(ref.current){
        const r=ref.current.getBoundingClientRect();
        if(cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom){
          const tY=cy-r.top+ref.current.scrollTop;
          const s=toTime(Math.max(0,tY));
          const en=toTime(Math.min(TL_H-1,tY+dgH.current));
          setPreview({sh:s.h,sm:s.m,eh:en.h,em:en.m,color:drag.color});
        }else setPreview(null);
      }
    }
    function up(e){
      const cy=e.changedTouches?e.changedTouches[0].clientY:e.clientY;
      const cx=e.changedTouches?e.changedTouches[0].clientX:e.clientX;
      if(ref.current){
        const r=ref.current.getBoundingClientRect();
        if(cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom){
          const tY=cy-r.top+ref.current.scrollTop;
          const s=toTime(Math.max(0,tY));
          const en=toTime(Math.min(TL_H-1,tY+dgH.current));
          addBlock(drag.type,drag.id,s.h,s.m,en.h,en.m);
        }
      }
      setDrag(null);setGPos(null);setPreview(null);
    }
    window.addEventListener("mousemove",mv);window.addEventListener("mouseup",up);
    window.addEventListener("touchmove",mv,{passive:false});window.addEventListener("touchend",up);
    return()=>{window.removeEventListener("mousemove",mv);window.removeEventListener("mouseup",up);window.removeEventListener("touchmove",mv);window.removeEventListener("touchend",up);};
  },[drag,date,dayMB,dayAB]);

  function startGhostResize(e){
    e.preventDefault();e.stopPropagation();
    const sy=e.touches?e.touches[0].clientY:e.clientY;
    const sh=dgH.current;
    function mv(ev){ev.preventDefault();const cy=ev.touches?ev.touches[0].clientY:ev.clientY;const nh=Math.max(HOUR_H*0.5,sh+(cy-sy));dgH.current=nh;setGH(nh);}
    function up(){window.removeEventListener("mousemove",mv);window.removeEventListener("mouseup",up);window.removeEventListener("touchmove",mv);window.removeEventListener("touchend",up);}
    window.addEventListener("mousemove",mv);window.addEventListener("mouseup",up);
    window.addEventListener("touchmove",mv,{passive:false});window.addEventListener("touchend",up);
  }

  // ── BLOCK MOVE ──────────────────────────────────────────────────
  function startMove(e,block,type){
    e.stopPropagation();e.preventDefault();
    const ref=type==="mood"?mTl:aTl;
    const cy0=e.touches?e.touches[0].clientY:e.clientY;
    const rect=ref.current.getBoundingClientRect();
    const dur=toY(block.eh,block.em)-toY(block.sh,block.sm);
    const offset=(cy0-rect.top+ref.current.scrollTop)-toY(block.sh,block.sm);
    function mv(ev){
      ev.preventDefault();
      const cy=ev.touches?ev.touches[0].clientY:ev.clientY;
      const raw=cy-rect.top+ref.current.scrollTop-offset;
      const cY=Math.max(0,Math.min(TL_H-dur-1,raw));
      const s=toTime(cY);const en=toTime(Math.min(TL_H-1,cY+dur));
      updBlock(type,block.id,{sh:s.h,sm:s.m,eh:en.h,em:en.m});
    }
    function up(){window.removeEventListener("mousemove",mv);window.removeEventListener("mouseup",up);window.removeEventListener("touchmove",mv);window.removeEventListener("touchend",up);}
    window.addEventListener("mousemove",mv);window.addEventListener("mouseup",up);
    window.addEventListener("touchmove",mv,{passive:false});window.addEventListener("touchend",up);
  }

  // ── BLOCK RESIZE ────────────────────────────────────────────────
  function startResize(e,block,type){
    e.stopPropagation();e.preventDefault();
    const ref=type==="mood"?mTl:aTl;
    const rect=ref.current.getBoundingClientRect();
    function mv(ev){
      ev.preventDefault();
      const cy=ev.touches?ev.touches[0].clientY:ev.clientY;
      const y=cy-rect.top+ref.current.scrollTop;
      const minEnd=toY(block.sh,block.sm)+HOUR_H*0.5;
      const en=toTime(Math.max(minEnd,Math.min(TL_H-1,y)));
      updBlock(type,block.id,{eh:en.h,em:en.m});
    }
    function up(){window.removeEventListener("mousemove",mv);window.removeEventListener("mouseup",up);window.removeEventListener("touchmove",mv);window.removeEventListener("touchend",up);}
    window.addEventListener("mousemove",mv);window.addEventListener("mouseup",up);
    window.addEventListener("touchmove",mv,{passive:false});window.addEventListener("touchend",up);
  }

  // ── LONG PRESS on block body → context menu ─────────────────────
  const lpTimer=useRef(null);
  const lpMoved=useRef(false);

  function onBlockTouchStart(e,b,type){
    lpMoved.current=false;
    lpTimer.current=setTimeout(()=>{
      if(!lpMoved.current){
        const t=e.touches[0];
        if(navigator.vibrate) navigator.vibrate(40);
        setEditBlk({b,type});
      }
    },LONG_PRESS_MS);
  }
  function onBlockTouchMove(){lpMoved.current=true;clearTimeout(lpTimer.current);}
  function onBlockTouchEnd(){clearTimeout(lpTimer.current);}
  function onBlockRightClick(e,b,type){e.preventDefault();e.stopPropagation();setCtx({b,type,x:e.clientX,y:e.clientY});}

  function chDate(d){const dt=new Date(date);dt.setDate(dt.getDate()+d);setDate(dt.toISOString().slice(0,10));}
  function freq(id,blocks){return Object.values(blocks).flat().filter(b=>b.defId===id).length;}
  const sMDefs=[...mDefs].sort((a,b)=>freq(b.id,mBlocks)-freq(a.id,mBlocks));
  const sADefs=[...aDefs].sort((a,b)=>freq(b.id,aBlocks)-freq(a.id,aBlocks));
  const chips=isMood?sMDefs:sADefs;

  function statsData(range){
    const t=new Date(today()),days=range==="week"?7:30,dates=[];
    for(let i=days-1;i>=0;i--){const d=new Date(t);d.setDate(d.getDate()-i);dates.push(d.toISOString().slice(0,10));}
    const mm={};mDefs.forEach(m=>mm[m.id]=0);
    dates.forEach(dt=>(mBlocks[dt]||[]).forEach(b=>{if(mm[b.defId]!==undefined)mm[b.defId]+=durMins(b);}));
    const ov={};
    mDefs.forEach(m=>{ov[m.id]={};aDefs.forEach(a=>ov[m.id][a.id]=0);});
    dates.forEach(dt=>{
      (mBlocks[dt]||[]).forEach(mb=>{
        (aBlocks[dt]||[]).forEach(ab=>{
          const mS=toY(mb.sh,mb.sm),mE=toY(mb.eh,mb.em);
          const aS=toY(ab.sh,ab.sm),aE=toY(ab.eh,ab.em);
          const o=Math.max(0,Math.min(mE,aE)-Math.max(mS,aS));
          const oMin=Math.round(o/HOUR_H*60);
          if(oMin>0&&ov[mb.defId]?.[ab.defId]!==undefined)ov[mb.defId][ab.defId]+=oMin;
        });
      });
    });
    return{mm,ov};
  }

  const dObj=new Date(date+"T00:00:00");
  const dateLabel=`${DAYS[dObj.getDay()]}, ${dObj.getDate()} ${MONTHS[dObj.getMonth()]}`;

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100dvh",userSelect:"none",background:"#f2f2f7"}} onClick={()=>setCtx(null)}>
      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>

        {(tab==="mood"||tab==="activity")&&(<>
          <div style={{padding:"14px 16px 0",flexShrink:0}}>
            <h1 style={{fontSize:19,fontWeight:800,color:"#1c1c1e",marginBottom:12}}>☀️ Mood Tracker</h1>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
              <button onClick={()=>chDate(-1)} style={NB}>‹</button>
              <span style={{fontSize:14,fontWeight:600,color:"#3a3a3c"}}>{dateLabel}</span>
              <button onClick={()=>chDate(1)} style={NB}>›</button>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,alignItems:"center",marginBottom:10}}>
              {chips.map(item=>(
                <div key={item.id} draggable
                  onMouseDown={e=>startDrag(e,{...item,type:tab})}
                  onTouchStart={e=>startDrag(e,{...item,type:tab})}
                  onDoubleClick={()=>{setEditDef({...item,type:tab});setEdn(item.name);setEdc(item.color);}}
                  style={{display:"flex",alignItems:"center",gap:5,padding:"7px 13px",borderRadius:20,background:"#fff",border:`1.5px solid ${rgba(item.color,0.5)}`,cursor:"grab",fontSize:13,fontWeight:600,color:"#1c1c1e",touchAction:"none",boxShadow:`0 1px 4px ${rgba(item.color,0.15)}`}}>
                  <span style={{width:9,height:9,borderRadius:2,background:item.color,display:"inline-block"}}/>
                  {item.name}
                </div>
              ))}
              <button onClick={()=>isMood?setNewMoodModal(true):setNewActModal(true)}
                style={{padding:"7px 12px",borderRadius:20,border:"1.5px dashed #ccc",background:"transparent",color:"#aaa",cursor:"pointer",fontSize:14,fontWeight:600}}>＋</button>
            </div>
          </div>

          {/* TIMELINE */}
          <div ref={tlRef} style={{flex:1,overflowY:"auto",position:"relative",margin:"0 16px",borderRadius:14,background:"#fff",boxShadow:"0 1px 6px rgba(0,0,0,0.07)",touchAction:"pan-y",WebkitOverflowScrolling:"touch"}}>
            {Array.from({length:13},(_,i)=>(
              <div key={i} style={{position:"absolute",top:i*HOUR_H*2,left:46,right:0,borderTop:i===0?"none":"1px solid #f0f0f0",pointerEvents:"none"}}>
                <span style={{position:"absolute",left:-46,top:i===0?2:-8,fontSize:10,color:"#bbb",width:38,textAlign:"right"}}>{String(i*2).padStart(2,"0")}:00</span>
              </div>
            ))}
            {Array.from({length:TOTAL_H+1},(_,i)=>(i%2!==0&&
              <div key={`m${i}`} style={{position:"absolute",top:i*HOUR_H,left:46,right:0,borderTop:"1px solid #f8f8f8",pointerEvents:"none"}}/>
            ))}

            {preview&&(
              <div style={{position:"absolute",left:50,right:6,top:toY(preview.sh,preview.sm),height:Math.max(HANDLE_H*2,toY(preview.eh,preview.em)-toY(preview.sh,preview.sm)),borderRadius:10,background:rgba(preview.color,0.15),border:`2px dashed ${preview.color}`,pointerEvents:"none",zIndex:3}}>
                <div style={{padding:"3px 8px",fontSize:11,color:preview.color,fontWeight:700}}>{fmt(preview.sh,preview.sm)} – {fmt(preview.eh,preview.em)}</div>
              </div>
            )}

            {curBlocks.map(b=>{
              const def=curDefs.find(d=>d.id===b.defId)||{color:"#aaa",name:"?"};
              const top=toY(b.sh,b.sm);
              const height=Math.max(HANDLE_H*2+8,toY(b.eh,b.em)-top);
              return(
                <div key={b.id}
                  onContextMenu={e=>onBlockRightClick(e,b,tab)}
                  onTouchStart={e=>onBlockTouchStart(e,b,tab)}
                  onTouchMove={onBlockTouchMove}
                  onTouchEnd={onBlockTouchEnd}
                  style={{position:"absolute",left:50,right:6,top,height,borderRadius:10,background:rgba(def.color,0.12),border:`1.5px solid ${rgba(def.color,0.6)}`,overflow:"hidden",zIndex:2}}>

                  {/* TOP HANDLE — move */}
                  <div
                    onMouseDown={e=>startMove(e,b,tab)}
                    onTouchStart={e=>{clearTimeout(lpTimer.current);startMove(e,b,tab);}}
                    style={{position:"absolute",top:0,left:0,right:0,height:HANDLE_H,background:rgba(def.color,0.28),display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 10px",cursor:"grab",touchAction:"none",borderRadius:"10px 10px 0 0",zIndex:3}}>
                    <span style={{fontSize:11,fontWeight:700,color:def.color,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{def.name}</span>
                    <span style={{fontSize:11,color:rgba(def.color,0.7),marginLeft:6,flexShrink:0}}>{fmt(b.sh,b.sm)}</span>
                    <span style={{fontSize:16,color:rgba(def.color,0.45),marginLeft:8,lineHeight:1}}>⠿</span>
                  </div>

                  {/* MIDDLE label */}
                  {height>HANDLE_H*2+20&&(
                    <div style={{position:"absolute",top:HANDLE_H,left:0,right:0,bottom:HANDLE_H,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
                      <span style={{fontSize:11,color:rgba(def.color,0.55)}}>{fmt(b.sh,b.sm)} – {fmt(b.eh,b.em)}</span>
                    </div>
                  )}

                  {/* BOTTOM HANDLE — resize */}
                  <div
                    onMouseDown={e=>{e.stopPropagation();startResize(e,b,tab);}}
                    onTouchStart={e=>{clearTimeout(lpTimer.current);e.stopPropagation();startResize(e,b,tab);}}
                    style={{position:"absolute",bottom:0,left:0,right:0,height:HANDLE_H,background:rgba(def.color,0.2),display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 10px",cursor:"s-resize",touchAction:"none",borderRadius:"0 0 10px 10px",zIndex:3}}>
                    <span style={{fontSize:11,color:rgba(def.color,0.65)}}>{fmt(b.eh,b.em)}</span>
                    <span style={{fontSize:16,color:rgba(def.color,0.45),lineHeight:1}}>↕</span>
                  </div>
                </div>
              );
            })}
            <div style={{height:TL_H}}/>
          </div>
          <div style={{height:6}}/>
        </>)}

        {tab==="stats"&&(
          <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
            <div style={{padding:"14px 16px 0",flexShrink:0}}>
              <h1 style={{fontSize:19,fontWeight:800,color:"#1c1c1e",marginBottom:12}}>☀️ Mood Tracker</h1>
              <div style={{display:"flex",gap:6,marginBottom:4}}>
                {[["week","Week"],["month","Month"]].map(([k,l])=>(
                  <button key={k} onClick={()=>setSv(k)}
                    style={{flex:1,padding:"9px 0",borderRadius:10,border:"none",cursor:"pointer",fontWeight:700,fontSize:13,background:sv===k?"#1c1c1e":"#e5e5ea",color:sv===k?"#fff":"#666"}}>
                    {l}
                  </button>
                ))}
              </div>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"12px 16px 100px"}}>
              <Stats mDefs={mDefs} aDefs={aDefs} statsData={statsData} sv={sv}/>
            </div>
          </div>
        )}
      </div>

      {/* BOTTOM BAR */}
      <div style={{display:"flex",background:"#fff",borderTop:"1px solid #e5e5ea",flexShrink:0,paddingBottom:"env(safe-area-inset-bottom,0px)"}}>
        {[["mood","😶","Mood"],["activity","⚡","Activity"],["stats","📊","Stats"]].map(([k,icon,l])=>(
          <button key={k} onClick={()=>setTab(k)}
            style={{flex:1,padding:"10px 0 8px",border:"none",cursor:"pointer",background:"transparent",color:tab===k?"#1c1c1e":"#aeaeb2",display:"flex",flexDirection:"column",alignItems:"center",gap:3,fontSize:20}}>
            <span>{icon}</span>
            <span style={{fontSize:10,fontWeight:700}}>{l}</span>
          </button>
        ))}
      </div>

      {/* DRAG GHOST */}
      {drag&&gPos&&(
        <div style={{position:"fixed",left:gPos.x-70,top:gPos.y,width:140,height:gH,borderRadius:10,background:rgba(drag.color,0.2),border:`2px solid ${drag.color}`,pointerEvents:"none",zIndex:999}}>
          <div style={{padding:"6px 10px",fontSize:12,fontWeight:700,color:drag.color}}>{drag.name}</div>
          <div onMouseDown={startGhostResize} onTouchStart={startGhostResize}
            style={{position:"absolute",bottom:0,left:0,right:0,height:HANDLE_H,background:rgba(drag.color,0.2),display:"flex",alignItems:"center",justifyContent:"center",cursor:"s-resize",pointerEvents:"all",borderRadius:"0 0 10px 10px"}}>
            <span style={{fontSize:16,color:rgba(drag.color,0.6)}}>↕</span>
          </div>
        </div>
      )}

      {/* CONTEXT MENU */}
      {ctx&&(
        <div style={{position:"fixed",left:Math.min(ctx.x,window.innerWidth-170),top:Math.min(ctx.y,window.innerHeight-110),background:"#fff",borderRadius:14,boxShadow:"0 8px 30px rgba(0,0,0,0.15)",zIndex:400,overflow:"hidden",minWidth:160,border:"1px solid #e5e5ea"}} onClick={e=>e.stopPropagation()}>
          <button onClick={()=>{setEditBlk({b:ctx.b,type:ctx.type});setCtx(null);}} style={CB}>✏️&nbsp; Edit block</button>
          <div style={{height:1,background:"#f2f2f7",margin:"0 14px"}}/>
          <button onClick={()=>delBlock(ctx.type,ctx.b.id)} style={{...CB,color:"#E74C3C"}}>🗑️&nbsp; Delete block</button>
        </div>
      )}

      {/* EDIT BLOCK MODAL */}
      {editBlk&&(
        <Modal title="Edit block" onClose={()=>setEditBlk(null)}>
          {(()=>{
            const defs=editBlk.type==="mood"?mDefs:aDefs;
            const def=defs.find(d=>d.id===editBlk.b.defId)||{name:"?",color:"#aaa"};
            return(
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{width:13,height:13,borderRadius:3,background:def.color,display:"inline-block"}}/>
                  <span style={{fontWeight:700,fontSize:15}}>{def.name}</span>
                  <span style={{color:"#aaa",fontSize:13,marginLeft:4}}>{fmt(editBlk.b.sh,editBlk.b.sm)} – {fmt(editBlk.b.eh,editBlk.b.em)}</span>
                </div>
                <p style={{fontSize:12,color:"#aaa",margin:0}}>Change {editBlk.type}:</p>
                <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                  {defs.map(d=>(
                    <button key={d.id} onClick={()=>{updBlock(editBlk.type,editBlk.b.id,{defId:d.id});setEditBlk(null);}}
                      style={{padding:"8px 14px",borderRadius:8,border:`1.5px solid ${rgba(d.color,0.5)}`,background:rgba(d.color,0.1),color:d.color,cursor:"pointer",fontSize:13,fontWeight:700}}>{d.name}</button>
                  ))}
                </div>
                <button onClick={()=>delBlock(editBlk.type,editBlk.b.id)} style={{...BS,background:"#E74C3C",marginTop:4}}>Delete block</button>
              </div>
            );
          })()}
        </Modal>
      )}

      {/* NEW MOOD */}
      {newMoodModal&&(
        <Modal title="New mood" onClose={()=>setNewMoodModal(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <input value={newNm} onChange={e=>setNewNm(e.target.value)} placeholder="Mood name" style={IS} autoFocus/>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:13,color:"#aaa"}}>Color</span>
              <input type="color" value={newNc} onChange={e=>setNewNc(e.target.value)} style={{width:44,height:34,border:"none",background:"none",cursor:"pointer"}}/>
            </div>
            <button onClick={()=>{if(!newNm.trim())return;addDef("mood",newNm.trim(),newNc);setNewNm("");setNewNc("#a0c4ff");setNewMoodModal(false);}} style={BS}>Add mood</button>
          </div>
        </Modal>
      )}

      {/* NEW ACTIVITY */}
      {newActModal&&(
        <Modal title="New activity" onClose={()=>setNewActModal(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <input value={newAn} onChange={e=>setNewAn(e.target.value)} placeholder="Activity name" style={IS} autoFocus/>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:13,color:"#aaa"}}>Color</span>
              <input type="color" value={newAc} onChange={e=>setNewAc(e.target.value)} style={{width:44,height:34,border:"none",background:"none",cursor:"pointer"}}/>
            </div>
            <button onClick={()=>{if(!newAn.trim())return;addDef("activity",newAn.trim(),newAc);setNewAn("");setNewAc("#fd9644");setNewActModal(false);}} style={BS}>Add activity</button>
          </div>
        </Modal>
      )}

      {/* EDIT DEF */}
      {editDef&&(
        <Modal title={`Edit ${editDef.type}`} onClose={()=>setEditDef(null)}>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <input value={edn} onChange={e=>setEdn(e.target.value)} style={IS}/>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:13,color:"#aaa"}}>Color</span>
              <input type="color" value={edc} onChange={e=>setEdc(e.target.value)} style={{width:44,height:34,border:"none",background:"none",cursor:"pointer"}}/>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{updDef(editDef.type,editDef.id,{name:edn,color:edc});setEditDef(null);}} style={{...BS,flex:1}}>Save</button>
              <button onClick={()=>delDef(editDef.type,editDef.id)} style={{...BS,flex:1,background:"#E74C3C"}}>Delete</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

function Stats({mDefs,aDefs,statsData,sv}){
  const{mm,ov}=statsData(sv);
  const total=Object.values(mm).reduce((a,b)=>a+b,0);
  const sorted=[...mDefs].sort((a,b)=>(mm[b.id]||0)-(mm[a.id]||0)).filter(m=>mm[m.id]>0);
  function fd(mins){if(mins<60)return`${mins}m`;return`${Math.floor(mins/60)}h${mins%60>0?` ${mins%60}m`:""}`.trim();}
  return(
    <div>
      <div style={{background:"#fff",borderRadius:14,padding:16,marginBottom:14,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
        <div style={SL}>Mood Rank</div>
        {!sorted.length&&<span style={{color:"#bbb",fontSize:13}}>No data yet.</span>}
        {sorted.map((m,i)=>{
          const mins=mm[m.id]||0;
          const pct=total>0?Math.round((mins/total)*100):0;
          return(
            <div key={m.id} style={{marginBottom:i<sorted.length-1?14:0}}>
              <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:5}}>
                <span style={{color:"#ccc",fontSize:11,fontWeight:700,width:16}}>#{i+1}</span>
                <span style={{width:11,height:11,borderRadius:3,background:m.color,display:"inline-block",flexShrink:0}}/>
                <span style={{flex:1,fontSize:13,fontWeight:700,color:"#1c1c1e"}}>{m.name}</span>
                <span style={{fontSize:12,color:"#666"}}>{fd(mins)}</span>
                <span style={{fontSize:12,fontWeight:700,color:m.color,width:36,textAlign:"right"}}>{pct}%</span>
              </div>
              <div style={{height:6,borderRadius:3,background:"#f2f2f7",overflow:"hidden",marginLeft:23}}>
                <div style={{height:"100%",width:`${pct}%`,background:m.color,borderRadius:3}}/>
              </div>
            </div>
          );
        })}
      </div>
      <div style={{background:"#fff",borderRadius:14,padding:16,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
        <div style={SL}>Activity Overlapped</div>
        {!sorted.length&&<span style={{color:"#bbb",fontSize:13}}>No data yet.</span>}
        {sorted.map((m,mi)=>{
          const entries=aDefs.map(a=>({a,mins:ov[m.id]?.[a.id]||0})).filter(x=>x.mins>0).sort((x,y)=>y.mins-x.mins);
          if(!entries.length)return null;
          const tot=entries.reduce((s,x)=>s+x.mins,0);
          return(
            <div key={m.id} style={{marginBottom:mi<sorted.length-1?18:0}}>
              <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:10}}>
                <span style={{width:11,height:11,borderRadius:3,background:m.color,display:"inline-block",flexShrink:0}}/>
                <span style={{fontSize:14,fontWeight:800,color:"#1c1c1e"}}>{m.name}</span>
              </div>
              <div style={{height:10,borderRadius:5,overflow:"hidden",display:"flex",marginBottom:10,marginLeft:18}}>
                {entries.map(({a,mins})=><div key={a.id} style={{width:`${tot>0?Math.round((mins/tot)*100):0}%`,background:a.color,height:"100%"}}/>)}
              </div>
              {entries.map(({a,mins},ai)=>{
                const pct=tot>0?Math.round((mins/tot)*100):0;
                return(
                  <div key={a.id} style={{display:"flex",alignItems:"center",gap:7,marginBottom:ai<entries.length-1?7:0,marginLeft:18}}>
                    <span style={{width:8,height:8,borderRadius:2,background:a.color,display:"inline-block",flexShrink:0}}/>
                    <span style={{flex:1,fontSize:12,color:"#3a3a3c",fontWeight:500}}>{a.name}</span>
                    <span style={{fontSize:12,color:"#888"}}>{fd(mins)}</span>
                    <span style={{fontSize:12,fontWeight:700,color:a.color,width:36,textAlign:"right"}}>{pct}%</span>
                  </div>
                );
              })}
            </div>
          );
        }).filter(Boolean)}
      </div>
    </div>
  );
}

function Modal({title,children,onClose}){
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.3)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
      <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:24,width:"100%",maxWidth:480,boxShadow:"0 -4px 30px rgba(0,0,0,0.1)"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <span style={{fontSize:16,fontWeight:700,color:"#1c1c1e"}}>{title}</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#aaa",cursor:"pointer",fontSize:22,lineHeight:1}}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

const IS={background:"#f2f2f7",border:"1.5px solid #e5e5ea",borderRadius:10,padding:"11px 14px",color:"#1c1c1e",fontSize:14,outline:"none",width:"100%",boxSizing:"border-box"};
const BS={background:"#1c1c1e",border:"none",borderRadius:10,padding:"12px 16px",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",width:"100%"};
const NB={background:"#e5e5ea",border:"none",color:"#3a3a3c",borderRadius:10,padding:"8px 18px",cursor:"pointer",fontSize:18,fontWeight:600};
const CB={display:"block",width:"100%",padding:"14px 16px",background:"none",border:"none",color:"#1c1c1e",cursor:"pointer",fontSize:14,textAlign:"left",fontWeight:500};
const SL={fontSize:11,color:"#aeaeb2",marginBottom:12,fontWeight:700,textTransform:"uppercase",letterSpacing:.8};

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
