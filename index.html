<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>☀️ Mood Tracker</title>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Mood Tracker"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;background:#f2f2f7;color:#1c1c1e;height:100dvh;overflow:hidden;}
    input,button{font-family:inherit;}
  </style>
</head>
<body>
<div id="app" style="height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

const HOUR_H=28;
const HALF_H=12;
const COL_H=HOUR_H*HALF_H;
const STEP=30; // minutes per nudge
const LONG_PRESS_MS=700;
// FIX 2: default block length changed from 2h to 1h
const DEFAULT_BLOCK_H=HOUR_H*1;

const DEF_MOODS=[{name:"Happy",color:"#F6A623"},{name:"Calm",color:"#27AE60"},{name:"Anxious",color:"#E74C3C"},{name:"Focused",color:"#2980B9"},{name:"Tired",color:"#8E44AD"}];
const DEF_ACTS=[{name:"Exercise",color:"#E67E22"},{name:"Meals",color:"#C0392B"},{name:"Work",color:"#1A5276"},{name:"Social",color:"#6C3483"},{name:"Sleep",color:"#1A8FA0"}];
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function toColY(h,m=0,col){return((h-col*12)+m/60)*HOUR_H;}
function colYToTime(y,col){
  const base=col*12;
  const t=Math.max(0,Math.min(COL_H-1,y));
  const h=Math.floor(t/HOUR_H)+base;
  const m=Math.round(((t%HOUR_H)/HOUR_H)*60);
  return{h:Math.min(h,col===0?11:23),m};
}
function toAbsY(h,m=0){return(h+m/60)*HOUR_H;}
function fmtTime(h,m){
  const hh=h===0?12:h>12?h-12:h;
  const mm=m>0?String(m).padStart(2,"0"):"00";
  return`${hh}${mm}`;
}
function fmtDur(mins){
  if(mins<=0)return"0min";
  if(mins<60)return`${mins}min`;
  const h=Math.floor(mins/60);
  const m=mins%60;
  return m>0?`${h}.${Math.round(m/60*10).toString().replace(/0$/,"")}h`:`${h}h`;
}
function today(){return new Date().toISOString().slice(0,10);}
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}
function durMins(b){return Math.max(0,(b.eh*60+b.em)-(b.sh*60+b.sm));}
function toMins(h,m){return h*60+m;}
function fromMins(total){return{h:Math.floor(total/60),m:total%60};}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function load(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}

function blockInCol(b,col){
  const colStart=col*12*60;
  const colEnd=(col+1)*12*60;
  const bStart=toMins(b.sh,b.sm);
  const bEnd=toMins(b.eh,b.em);
  const visStart=Math.max(bStart,colStart);
  const visEnd=Math.min(bEnd,colEnd);
  if(visEnd<=visStart)return null;
  const top=((visStart-colStart)/60)*HOUR_H;
  const height=((visEnd-visStart)/60)*HOUR_H;
  return{top,height,isStart:bStart>=colStart,isEnd:bEnd<=colEnd};
}

// ── SWIPE CHIP ───────────────────────────────────────────────────
// FIX 3: Replaced swipe-to-delete with long-press-to-delete to prevent
// conflict with the vertical drag-to-timeline gesture.
// The chip now shows a delete button only after a long press (700ms hold).
function SwipeChip({item,tab,onDragStart,onEdit,onDelete}){
  const [showDel,setShowDel]=useState(false);
  const lpRef=useRef(null);
  const movedRef=useRef(false);
  const isDragging=useRef(false);
  const startYRef=useRef(null);
  const startXRef=useRef(null);

  function cancelLP(){clearTimeout(lpRef.current);}

  function onTS(e){
    movedRef.current=false;
    isDragging.current=false;
    startYRef.current=e.touches[0].clientY;
    startXRef.current=e.touches[0].clientX;
    // Long press timer — triggers delete reveal
    lpRef.current=setTimeout(()=>{
      if(!movedRef.current){
        if(navigator.vibrate)navigator.vibrate(40);
        setShowDel(true);
      }
    },LONG_PRESS_MS);
  }

  function onTM(e){
    if(startYRef.current===null)return;
    const dx=e.touches[0].clientX-startXRef.current;
    const dy=e.touches[0].clientY-startYRef.current;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>8){
      movedRef.current=true;
      cancelLP();
      // If primarily vertical and not yet dragging, start drag
      if(!isDragging.current&&!showDel){
        isDragging.current=true;
        setShowDel(false);
        onDragStart(e,{...item,type:tab});
      }
    }
  }

  function onTE(){
    cancelLP();
    isDragging.current=false;
    startYRef.current=null;
    startXRef.current=null;
  }

  // Tap anywhere else on screen hides the delete button
  useEffect(()=>{
    if(!showDel)return;
    function hide(){setShowDel(false);}
    window.addEventListener("touchstart",hide,{once:true});
    window.addEventListener("mousedown",hide,{once:true});
    return()=>{window.removeEventListener("touchstart",hide);window.removeEventListener("mousedown",hide);};
  },[showDel]);

  return(
    <div style={{position:"relative",flexShrink:0,display:"flex",alignItems:"center",gap:4}}>
      {/* Chip */}
      <div
        onMouseDown={e=>{if(!showDel)onDragStart(e,{...item,type:tab});}}
        onTouchStart={onTS}
        onTouchMove={onTM}
        onTouchEnd={onTE}
        onDoubleClick={onEdit}
        style={{
          display:"flex",alignItems:"center",gap:6,padding:"9px 18px",
          borderRadius:20,background:"#fff",
          border:`1.5px solid ${rgba(item.color,showDel?0.8:0.45)}`,
          cursor:"grab",fontSize:14,fontWeight:600,color:"#1c1c1e",
          touchAction:"none",
          boxShadow:`0 1px 3px ${rgba(item.color,showDel?0.25:0.12)}`,
          transition:"border .15s,box-shadow .15s",
          userSelect:"none",
        }}>
        <span style={{width:10,height:10,borderRadius:2,background:item.color,display:"inline-block"}}/>
        {item.name}
      </div>
      {/* Delete button — appears after long press, inline to the right */}
      {showDel&&(
        <button
          onMouseDown={e=>e.stopPropagation()}
          onClick={e=>{e.stopPropagation();setShowDel(false);onDelete();}}
          style={{
            background:"#E74C3C",border:"none",borderRadius:14,
            width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",
            cursor:"pointer",fontSize:13,flexShrink:0,
            animation:"popIn .15s ease",
          }}>
        🗑️
        </button>
      )}
      <style>{`@keyframes popIn{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}`}</style>
    </div>
  );
}

function App(){
  const [tab,setTab]=useState("mood");
  const [sv,setSv]=useState("week");
  const [date,setDate]=useState(today());
  const [mDefs,setMDefs]=useState(()=>load("mt_md",DEF_MOODS.map(m=>({...m,id:uid()}))));
  const [aDefs,setADefs]=useState(()=>load("mt_ad",DEF_ACTS.map(a=>({...a,id:uid()}))));
  const [mBlocks,setMBlocks]=useState(()=>load("mt_mb",{}));
  const [aBlocks,setABlocks]=useState(()=>load("mt_ab",{}));
  const [selectedId,setSelectedId]=useState(null);

  useEffect(()=>save("mt_md",mDefs),[mDefs]);
  useEffect(()=>save("mt_ad",aDefs),[aDefs]);
  useEffect(()=>save("mt_mb",mBlocks),[mBlocks]);
  useEffect(()=>save("mt_ab",aBlocks),[aBlocks]);

  // Drag from chip
  const [drag,setDrag]=useState(null);
  const [gPos,setGPos]=useState(null);
  const [gH,setGH]=useState(DEFAULT_BLOCK_H); // FIX 2: use 1h default
  const [preview,setPreview]=useState(null);
  const dgH=useRef(DEFAULT_BLOCK_H); // FIX 2: use 1h default

  // Long press on blocks
  const lpTimer=useRef(null);
  const lpMoved=useRef(false);

  // Modals
  const [editBlk,setEditBlk]=useState(null);
  const [newMoodModal,setNewMoodModal]=useState(false);
  const [newNm,setNewNm]=useState(""); const [newNc,setNewNc]=useState("#a0c4ff");
  const [newActModal,setNewActModal]=useState(false);
  const [newAn,setNewAn]=useState(""); const [newAc,setNewAc]=useState("#fd9644");
  const [editDef,setEditDef]=useState(null);
  const [edn,setEdn]=useState(""); const [edc,setEdc]=useState("");

  const col0Ref=useRef(null);
  const col1Ref=useRef(null);

  const isMood=tab==="mood";
  const dayMB=mBlocks[date]||[];
  const dayAB=aBlocks[date]||[];
  const curBlocks=isMood?dayMB:dayAB;
  const curDefs=isMood?mDefs:aDefs;
  const selectedBlock=curBlocks.find(b=>b.id===selectedId)||null;

  function setMB(d,a){setMBlocks(p=>({...p,[d]:a}));}
  function setAB(d,a){setABlocks(p=>({...p,[d]:a}));}

  function addBlock(type,defId,sh,sm,eh,em){
    const b={id:uid(),defId,sh,sm,eh,em};
    if(type==="mood")setMB(date,[...dayMB,b]);
    else setAB(date,[...dayAB,b]);
    setSelectedId(b.id);
  }
  function updBlock(type,id,patch){
    const setter=type==="mood"?setMBlocks:setABlocks;
    setter(p=>({...p,[date]:(p[date]||[]).map(b=>b.id===id?{...b,...patch}:b)}));
  }
  function delBlock(type,id){
    const setter=type==="mood"?setMBlocks:setABlocks;
    setter(p=>({...p,[date]:(p[date]||[]).filter(b=>b.id!==id)}));
    setEditBlk(null); setSelectedId(null);
  }
  function addDef(type,name,color){
    const d={id:uid(),name,color};
    if(type==="mood")setMDefs(x=>[...x,d]);else setADefs(x=>[...x,d]);
  }
  function updDef(type,id,patch){
    if(type==="mood")setMDefs(x=>x.map(d=>d.id===id?{...d,...patch}:d));
    else setADefs(x=>x.map(d=>d.id===id?{...d,...patch}:d));
  }
  function delDef(type,id){
    if(type==="mood")setMDefs(x=>x.filter(d=>d.id!==id));
    else setADefs(x=>x.filter(d=>d.id!==id));
    setEditDef(null);
  }

  // ── NUDGE selected block ────────────────────────────────────────
  // FIX 1: − button now shrinks the block by moving END back (nudgeEnd(-STEP))
  //         + button grows the block by moving END forward (nudgeEnd(+STEP))
  //         This replaces the old behaviour where − moved the START earlier.
  function nudgeEnd(delta){
    if(!selectedBlock)return;
    const type=isMood?"mood":"activity";
    const minEnd=toMins(selectedBlock.sh,selectedBlock.sm)+STEP;
    const newEnd=clamp(toMins(selectedBlock.eh,selectedBlock.em)+delta,minEnd,23*60+30);
    const{h,m}=fromMins(newEnd);
    updBlock(type,selectedBlock.id,{eh:h,em:m});
  }

  // ── DRAG FROM CHIP ──────────────────────────────────────────────
  function startDrag(e,item){
    e.preventDefault();
    setSelectedId(null);
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    dgH.current=DEFAULT_BLOCK_H; setGH(DEFAULT_BLOCK_H); // FIX 2
    setDrag(item); setGPos({x:cx,y:cy});
  }

  function getColRef(cx){
    for(const [ref,col] of [[col0Ref,0],[col1Ref,1]]){
      if(ref.current){const r=ref.current.getBoundingClientRect();if(cx>=r.left&&cx<=r.right)return{ref,col};}
    }
    return null;
  }

  useEffect(()=>{
    if(!drag)return;
    function mv(e){
      e.preventDefault();
      const cy=e.touches?e.touches[0].clientY:e.clientY;
      const cx=e.touches?e.touches[0].clientX:e.clientX;
      setGPos({x:cx,y:cy});
      const found=getColRef(cx);
      if(found){
        const{ref,col}=found;
        const r=ref.current.getBoundingClientRect();
        const tY=cy-r.top+ref.current.scrollTop;
        const s=colYToTime(Math.max(0,tY),col);
        const snapStart=Math.round(toMins(s.h,s.m)/STEP)*STEP;
        // FIX 2: use 60min (1h) as default drop duration instead of 120min
        const endSnap=Math.round((snapStart+60)/STEP)*STEP;
        const es=fromMins(clamp(snapStart,col*12*60,(col+1)*12*60-STEP));
        const ee=fromMins(clamp(endSnap,col*12*60+STEP,(col+1)*12*60));
        setPreview({col,top:Math.max(0,tY),height:Math.max(HOUR_H,Math.min(COL_H-tY,dgH.current)),sh:es.h,sm:es.m,eh:ee.h,em:ee.m,color:drag.color});
      }else setPreview(null);
    }
    function up(e){
      if(preview) addBlock(drag.type,drag.id,preview.sh,preview.sm,preview.eh,preview.em);
      setDrag(null);setGPos(null);setPreview(null);
    }
    window.addEventListener("mousemove",mv);window.addEventListener("mouseup",up);
    window.addEventListener("touchmove",mv,{passive:false});window.addEventListener("touchend",up);
    return()=>{window.removeEventListener("mousemove",mv);window.removeEventListener("mouseup",up);window.removeEventListener("touchmove",mv);window.removeEventListener("touchend",up);};
  },[drag,preview,date,dayMB,dayAB]);

  function startGhostResize(e){
    e.preventDefault();e.stopPropagation();
    const sy=e.touches?e.touches[0].clientY:e.clientY;
    const sh=dgH.current;
    function mv(ev){ev.preventDefault();const cy=ev.touches?ev.touches[0].clientY:ev.clientY;const nh=Math.max(HOUR_H,sh+(cy-sy));dgH.current=nh;setGH(nh);}
    function up(){window.removeEventListener("mousemove",mv);window.removeEventListener("mouseup",up);window.removeEventListener("touchmove",mv);window.removeEventListener("touchend",up);}
    window.addEventListener("mousemove",mv);window.addEventListener("mouseup",up);
    window.addEventListener("touchmove",mv,{passive:false});window.addEventListener("touchend",up);
  }

  // ── LONG PRESS on timeline block → edit modal ──────────────────
  function onBTouchStart(e,b,type){
    lpMoved.current=false;
    lpTimer.current=setTimeout(()=>{
      if(!lpMoved.current){if(navigator.vibrate)navigator.vibrate(40);setEditBlk({b,type});}
    },LONG_PRESS_MS);
  }
  function onBTouchMove(){lpMoved.current=true;clearTimeout(lpTimer.current);}
  function onBTouchEnd(){clearTimeout(lpTimer.current);}
  function onBRC(e,b,type){e.preventDefault();e.stopPropagation();setEditBlk({b,type});}

  function chDate(d){const dt=new Date(date);dt.setDate(dt.getDate()+d);setDate(dt.toISOString().slice(0,10));setSelectedId(null);}

  function freq(id,blocks){return Object.values(blocks).flat().filter(b=>b.defId===id).length;}
  const sMDefs=[...mDefs].sort((a,b)=>freq(b.id,mBlocks)-freq(a.id,mBlocks));
  const sADefs=[...aDefs].sort((a,b)=>freq(b.id,aBlocks)-freq(a.id,aBlocks));
  const chips=isMood?sMDefs:sADefs;

  function statsData(range){
    const t=new Date(today()),days=range==="week"?7:30,dates=[];
    for(let i=days-1;i>=0;i--){const d=new Date(t);d.setDate(d.getDate()-i);dates.push(d.toISOString().slice(0,10));}
    const mm={};mDefs.forEach(m=>mm[m.id]=0);
    dates.forEach(dt=>(mBlocks[dt]||[]).forEach(b=>{if(mm[b.defId]!==undefined)mm[b.defId]+=durMins(b);}));
    const ov={};
    mDefs.forEach(m=>{ov[m.id]={};aDefs.forEach(a=>ov[m.id][a.id]=0);});
    dates.forEach(dt=>{
      (mBlocks[dt]||[]).forEach(mb=>{
        (aBlocks[dt]||[]).forEach(ab=>{
          const mS=toAbsY(mb.sh,mb.sm),mE=toAbsY(mb.eh,mb.em);
          const aS=toAbsY(ab.sh,ab.sm),aE=toAbsY(ab.eh,ab.em);
          const o=Math.max(0,Math.min(mE,aE)-Math.max(mS,aS));
          const oMin=Math.round(o/HOUR_H*60);
          if(oMin>0&&ov[mb.defId]?.[ab.defId]!==undefined)ov[mb.defId][ab.defId]+=oMin;
        });
      });
    });
    return{mm,ov};
  }

  const dObj=new Date(date+"T00:00:00");
  const dateLabel=`${DAYS[dObj.getDay()]}, ${dObj.getDate()} ${MONTHS[dObj.getMonth()]}`;

  // ── TIMELINE COLUMN ─────────────────────────────────────────────
  function TimelineCol({col}){
    const ref=col===0?col0Ref:col1Ref;
    const colBlocks=curBlocks.filter(b=>blockInCol(b,col)!==null);
    return(
      <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
        <div ref={ref} style={{flex:1,overflow:"hidden",position:"relative",borderRadius:10,background:"#fff",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
          {Array.from({length:HALF_H+1},(_,i)=>{
            const absH=col*12+i;
            const label=fmtTime(absH,0).replace(":00","");
            return(
              <div key={i} style={{position:"absolute",top:i*HOUR_H,left:34,right:0,borderTop:i===0?"none":"1px solid #f0f0f0",pointerEvents:"none"}}>
                <span style={{position:"absolute",left:-34,top:i===0?1:-8,fontSize:9,color:"#ccc",width:30,textAlign:"right",lineHeight:1.1}}>{label}</span>
              </div>
            );
          })}
          {Array.from({length:HALF_H},(_,i)=>(
            <div key={`hh${i}`} style={{position:"absolute",top:i*HOUR_H+HOUR_H/2,left:34,right:0,borderTop:"1px solid #f8f8f8",pointerEvents:"none"}}/>
          ))}

          {preview&&preview.col===col&&(
            <div style={{position:"absolute",left:36,right:4,top:preview.top,height:Math.max(HOUR_H,preview.height),borderRadius:8,background:rgba(preview.color,0.15),border:`2px dashed ${preview.color}`,pointerEvents:"none",zIndex:3,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <span style={{fontSize:10,color:preview.color,fontWeight:700}}>{fmtTime(preview.sh,preview.sm)}</span>
            </div>
          )}

          {colBlocks.map(b=>{
            const def=curDefs.find(d=>d.id===b.defId)||{color:"#aaa",name:"?"};
            const seg=blockInCol(b,col);
            if(!seg)return null;
            const{top,height,isStart,isEnd}=seg;
            const mins=durMins(b);
            const isSelected=b.id===selectedId;
            const showLabel=height>28;
            return(
              <div key={b.id}
                onClick={e=>{e.stopPropagation();setSelectedId(b.id===selectedId?null:b.id);}}
                onContextMenu={e=>onBRC(e,b,tab)}
                onTouchStart={e=>onBTouchStart(e,b,tab)}
                onTouchMove={onBTouchMove}
                onTouchEnd={onBTouchEnd}
                style={{
                  position:"absolute",left:36,right:4,top,height,
                  borderRadius:isStart&&isEnd?8:isStart?"8px 8px 0 0":isEnd?"0 0 8px 8px":0,
                  background:rgba(def.color,isSelected?0.28:0.16),
                  border:`${isSelected?2:1.5}px solid ${rgba(def.color,isSelected?0.9:0.5)}`,
                  overflow:"hidden",zIndex:isSelected?4:2,
                  boxShadow:isSelected?`0 2px 12px ${rgba(def.color,0.3)}`:"none",
                  cursor:"pointer",transition:"box-shadow .15s,border .15s"
                }}>
                {showLabel&&(
                  <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",pointerEvents:"none",gap:1}}>
                    <span style={{fontSize:10,fontWeight:700,color:def.color,textAlign:"center",padding:"0 3px"}}>{def.name}</span>
                    <span style={{fontSize:9,color:rgba(def.color,0.7)}}>{fmtDur(mins)}</span>
                  </div>
                )}
                {!showLabel&&(
                  <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
                    <span style={{fontSize:9,fontWeight:700,color:def.color,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",padding:"0 3px"}}>{def.name}</span>
                  </div>
                )}
              </div>
            );
          })}
          <div style={{height:COL_H}}/>
        </div>
      </div>
    );
  }

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100dvh",userSelect:"none",background:"#f2f2f7"}}
      onClick={()=>setSelectedId(null)}>
      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>

        {(tab==="mood"||tab==="activity")&&(<>
          <div style={{padding:"12px 16px 0",flexShrink:0}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
              <button onClick={()=>chDate(-1)} style={NB}>‹</button>
              <span style={{fontSize:13,fontWeight:600,color:"#3a3a3c"}}>{dateLabel}</span>
              <button onClick={()=>chDate(1)} style={NB}>›</button>
            </div>
            <div style={{display:"flex",overflowX:"auto",gap:10,alignItems:"center",marginBottom:12,paddingBottom:8,paddingTop:2,WebkitOverflowScrolling:"touch",scrollbarWidth:"none"}}
              onClick={e=>e.stopPropagation()}>
              {chips.map(item=>(
                <SwipeChip key={item.id} item={item} tab={tab}
                  onDragStart={startDrag}
                  onEdit={()=>{setEditDef({...item,type:tab});setEdn(item.name);setEdc(item.color);}}
                  onDelete={()=>delDef(tab,item.id)}/>
              ))}
              <button onClick={()=>isMood?setNewMoodModal(true):setNewActModal(true)}
                style={{padding:"6px 12px",borderRadius:20,border:"1.5px dashed #ccc",background:"transparent",color:"#aaa",cursor:"pointer",fontSize:13,fontWeight:600,flexShrink:0}}>＋</button>
            </div>
          </div>

          <div style={{flex:1,overflow:"hidden",display:"flex",gap:10,padding:"0 12px",minHeight:0}}>
            <TimelineCol col={0}/>
            <TimelineCol col={1}/>
          </div>

          {/* SELECTED BLOCK CONTROLS */}
          {/* FIX 1: − now calls nudgeEnd(-STEP) to shrink block, + calls nudgeEnd(+STEP) to grow it */}
          {selectedBlock&&(()=>{
            const def=curDefs.find(d=>d.id===selectedBlock.defId)||{color:"#aaa",name:"?"};
            const type=isMood?"mood":"activity";
            return(
              <div onClick={e=>e.stopPropagation()} style={{flexShrink:0,margin:"6px 12px 0",background:"#fff",borderRadius:14,padding:"10px 14px",boxShadow:"0 1px 6px rgba(0,0,0,0.08)",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
                <span style={{width:10,height:10,borderRadius:2,background:def.color,flexShrink:0,display:"inline-block"}}/>
                <span style={{fontSize:13,fontWeight:700,color:def.color,flex:1}}>{def.name} <span style={{fontWeight:400,color:"#aaa",fontSize:11}}>{fmtDur(durMins(selectedBlock))}</span></span>
                <button onClick={()=>nudgeEnd(-STEP)} style={{...ND,fontSize:18}}>−</button>
                <button onClick={()=>nudgeEnd(STEP)} style={{...ND,fontSize:18}}>＋</button>
                <button onClick={()=>delBlock(type,selectedBlock.id)}
                  style={{background:"#fff0f0",border:"none",borderRadius:8,width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:16,flexShrink:0}}>
                  🗑️
                </button>
              </div>
            );
          })()}
          <div style={{height:6}}/>
        </>)}

        {tab==="stats"&&(
          <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
            <div style={{padding:"12px 16px 0",flexShrink:0}}>
              <div style={{display:"flex",gap:6,marginBottom:4}}>
                {[["week","Week"],["month","Month"]].map(([k,l])=>(
                  <button key={k} onClick={()=>setSv(k)}
                    style={{flex:1,padding:"9px 0",borderRadius:10,border:"none",cursor:"pointer",fontWeight:700,fontSize:13,background:sv===k?"#1c1c1e":"#e5e5ea",color:sv===k?"#fff":"#666"}}>
                    {l}
                  </button>
                ))}
              </div>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"12px 16px 100px"}}>
              <Stats mDefs={mDefs} aDefs={aDefs} statsData={statsData} sv={sv}/>
            </div>
          </div>
        )}
      </div>

      {/* BOTTOM BAR */}
      <div style={{display:"flex",background:"#fff",borderTop:"1px solid #e5e5ea",flexShrink:0,paddingBottom:"env(safe-area-inset-bottom,0px)"}}>
        {[["mood","😶","Mood"],["activity","⚡","Activity"],["stats","📊","Stats"]].map(([k,icon,l])=>(
          <button key={k} onClick={()=>{setTab(k);setSelectedId(null);}}
            style={{flex:1,padding:"10px 0 8px",border:"none",cursor:"pointer",background:"transparent",color:tab===k?"#1c1c1e":"#aeaeb2",display:"flex",flexDirection:"column",alignItems:"center",gap:3,fontSize:20}}>
            <span>{icon}</span>
            <span style={{fontSize:10,fontWeight:700}}>{l}</span>
          </button>
        ))}
      </div>

      {/* DRAG GHOST */}
      {drag&&gPos&&(
        <div style={{position:"fixed",left:gPos.x-55,top:gPos.y,width:110,height:gH,borderRadius:8,background:rgba(drag.color,0.2),border:`2px solid ${drag.color}`,pointerEvents:"none",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <span style={{fontSize:11,fontWeight:700,color:drag.color}}>{drag.name}</span>
          <div onMouseDown={startGhostResize} onTouchStart={startGhostResize}
            style={{position:"absolute",bottom:0,left:0,right:0,height:18,display:"flex",alignItems:"center",justifyContent:"center",cursor:"s-resize",pointerEvents:"all"}}>
            <span style={{fontSize:14,color:rgba(drag.color,0.5)}}>↕</span>
          </div>
        </div>
      )}

      {/* EDIT BLOCK MODAL */}
      {editBlk&&(
        <Modal title="Edit block" onClose={()=>setEditBlk(null)}>
          {(()=>{
            const defs=editBlk.type==="mood"?mDefs:aDefs;
            const def=defs.find(d=>d.id===editBlk.b.defId)||{name:"?",color:"#aaa"};
            return(
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{width:12,height:12,borderRadius:3,background:def.color,display:"inline-block"}}/>
                  <span style={{fontWeight:700,fontSize:15}}>{def.name}</span>
                  <span style={{color:"#aaa",fontSize:13,marginLeft:4}}>{fmtTime(editBlk.b.sh,editBlk.b.sm)} – {fmtTime(editBlk.b.eh,editBlk.b.em)} · {fmtDur(durMins(editBlk.b))}</span>
                </div>
                <p style={{fontSize:12,color:"#aaa",margin:0}}>Change {editBlk.type}:</p>
                <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                  {defs.map(d=>(
                    <button key={d.id} onClick={()=>{updBlock(editBlk.type,editBlk.b.id,{defId:d.id});setEditBlk(null);}}
                      style={{padding:"8px 14px",borderRadius:8,border:`1.5px solid ${rgba(d.color,0.5)}`,background:rgba(d.color,0.1),color:d.color,cursor:"pointer",fontSize:13,fontWeight:700}}>{d.name}</button>
                  ))}
                </div>
                <button onClick={()=>delBlock(editBlk.type,editBlk.b.id)} style={{...BS,background:"#E74C3C",marginTop:4}}>Delete block</button>
              </div>
            );
          })()}
        </Modal>
      )}

      {newMoodModal&&(
        <Modal title="New mood" onClose={()=>setNewMoodModal(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <input value={newNm} onChange={e=>setNewNm(e.target.value)} placeholder="Mood name" style={IS} autoFocus/>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:13,color:"#aaa"}}>Color</span>
              <input type="color" value={newNc} onChange={e=>setNewNc(e.target.value)} style={{width:44,height:34,border:"none",background:"none",cursor:"pointer"}}/>
            </div>
            <button onClick={()=>{if(!newNm.trim())return;addDef("mood",newNm.trim(),newNc);setNewNm("");setNewNc("#a0c4ff");setNewMoodModal(false);}} style={BS}>Add mood</button>
          </div>
        </Modal>
      )}

      {newActModal&&(
        <Modal title="New activity" onClose={()=>setNewActModal(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <input value={newAn} onChange={e=>setNewAn(e.target.value)} placeholder="Activity name" style={IS} autoFocus/>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:13,color:"#aaa"}}>Color</span>
              <input type="color" value={newAc} onChange={e=>setNewAc(e.target.value)} style={{width:44,height:34,border:"none",background:"none",cursor:"pointer"}}/>
            </div>
            <button onClick={()=>{if(!newAn.trim())return;addDef("activity",newAn.trim(),newAc);setNewAn("");setNewAc("#fd9644");setNewActModal(false);}} style={BS}>Add activity</button>
          </div>
        </Modal>
      )}

      {editDef&&(
        <Modal title={`Edit ${editDef.type}`} onClose={()=>setEditDef(null)}>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <input value={edn} onChange={e=>setEdn(e.target.value)} style={IS}/>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:13,color:"#aaa"}}>Color</span>
              <input type="color" value={edc} onChange={e=>setEdc(e.target.value)} style={{width:44,height:34,border:"none",background:"none",cursor:"pointer"}}/>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{updDef(editDef.type,editDef.id,{name:edn,color:edc});setEditDef(null);}} style={{...BS,flex:1}}>Save</button>
              <button onClick={()=>delDef(editDef.type,editDef.id)} style={{...BS,flex:1,background:"#E74C3C"}}>Delete</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

function Stats({mDefs,aDefs,statsData,sv}){
  const{mm,ov}=statsData(sv);
  const total=Object.values(mm).reduce((a,b)=>a+b,0);
  const sorted=[...mDefs].sort((a,b)=>(mm[b.id]||0)-(mm[a.id]||0)).filter(m=>mm[m.id]>0);
  function fd(mins){if(mins<60)return`${mins}min`;const h=Math.floor(mins/60);const m=mins%60;return m>0?`${h}.${Math.round(m/60*10)}h`:`${h}h`;}
  return(
    <div>
      <div style={{background:"#fff",borderRadius:14,padding:16,marginBottom:14,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
        <div style={SL}>Mood Rank</div>
        {!sorted.length&&<span style={{color:"#bbb",fontSize:13}}>No data yet.</span>}
        {sorted.map((m,i)=>{
          const mins=mm[m.id]||0;
          const pct=total>0?Math.round((mins/total)*100):0;
          return(
            <div key={m.id} style={{marginBottom:i<sorted.length-1?14:0}}>
              <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:5}}>
                <span style={{color:"#ccc",fontSize:11,fontWeight:700,width:16}}>#{i+1}</span>
                <span style={{width:10,height:10,borderRadius:3,background:m.color,display:"inline-block",flexShrink:0}}/>
                <span style={{flex:1,fontSize:13,fontWeight:700,color:"#1c1c1e"}}>{m.name}</span>
                <span style={{fontSize:12,color:"#666"}}>{fd(mins)}</span>
                <span style={{fontSize:12,fontWeight:700,color:m.color,width:36,textAlign:"right"}}>{pct}%</span>
              </div>
              <div style={{height:6,borderRadius:3,background:"#f2f2f7",overflow:"hidden",marginLeft:23}}>
                <div style={{height:"100%",width:`${pct}%`,background:m.color,borderRadius:3}}/>
              </div>
            </div>
          );
        })}
      </div>
      <div style={{background:"#fff",borderRadius:14,padding:16,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
        <div style={SL}>Activity Overlapped</div>
        {!sorted.length&&<span style={{color:"#bbb",fontSize:13}}>No data yet.</span>}
        {sorted.map((m,mi)=>{
          const entries=aDefs.map(a=>({a,mins:ov[m.id]?.[a.id]||0})).filter(x=>x.mins>0).sort((x,y)=>y.mins-x.mins);
          if(!entries.length)return null;
          const tot=entries.reduce((s,x)=>s+x.mins,0);
          return(
            <div key={m.id} style={{marginBottom:mi<sorted.length-1?18:0}}>
              <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:10}}>
                <span style={{width:10,height:10,borderRadius:3,background:m.color,display:"inline-block",flexShrink:0}}/>
                <span style={{fontSize:14,fontWeight:800,color:"#1c1c1e"}}>{m.name}</span>
              </div>
              <div style={{height:10,borderRadius:5,overflow:"hidden",display:"flex",marginBottom:10,marginLeft:18}}>
                {entries.map(({a,mins})=><div key={a.id} style={{width:`${tot>0?Math.round((mins/tot)*100):0}%`,background:a.color,height:"100%"}}/>)}
              </div>
              {entries.map(({a,mins},ai)=>{
                const pct=tot>0?Math.round((mins/tot)*100):0;
                return(
                  <div key={a.id} style={{display:"flex",alignItems:"center",gap:7,marginBottom:ai<entries.length-1?7:0,marginLeft:18}}>
                    <span style={{width:7,height:7,borderRadius:2,background:a.color,display:"inline-block",flexShrink:0}}/>
                    <span style={{flex:1,fontSize:12,color:"#3a3a3c",fontWeight:500}}>{a.name}</span>
                    <span style={{fontSize:12,color:"#888"}}>{fd(mins)}</span>
                    <span style={{fontSize:12,fontWeight:700,color:a.color,width:36,textAlign:"right"}}>{pct}%</span>
                  </div>
                );
              })}
            </div>
          );
        }).filter(Boolean)}
      </div>
    </div>
  );
}

function Modal({title,children,onClose}){
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.3)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
      <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:24,width:"100%",maxWidth:480,boxShadow:"0 -4px 30px rgba(0,0,0,0.1)"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <span style={{fontSize:16,fontWeight:700,color:"#1c1c1e"}}>{title}</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#aaa",cursor:"pointer",fontSize:22,lineHeight:1}}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

const IS={background:"#f2f2f7",border:"1.5px solid #e5e5ea",borderRadius:10,padding:"11px 14px",color:"#1c1c1e",fontSize:14,outline:"none",width:"100%",boxSizing:"border-box"};
const BS={background:"#1c1c1e",border:"none",borderRadius:10,padding:"12px 16px",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",width:"100%"};
const NB={background:"#e5e5ea",border:"none",color:"#3a3a3c",borderRadius:10,padding:"8px 18px",cursor:"pointer",fontSize:18,fontWeight:600};
const ND={background:"#f2f2f7",border:"none",borderRadius:6,width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:16,fontWeight:700,color:"#3a3a3c"};
const SL={fontSize:11,color:"#aeaeb2",marginBottom:12,fontWeight:700,textTransform:"uppercase",letterSpacing:.8};

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
